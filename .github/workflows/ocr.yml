name: OCR Image to Google Drive

on:
  repository_dispatch:
    types: [ocr]
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: OCR and upload to Google Drive
        env:
          DICTATION_IMAGE_BASE64: ${{ github.event.client_payload.image_base64 }}
          DICTATION_TIMESTAMP: ${{ github.event.client_payload.timestamp }}
          DICTATION_SOURCE: ${{ github.event.client_payload.source }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: cd scripts && python ocr_to_drive.py
