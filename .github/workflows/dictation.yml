name: Upload Dictation to Google Drive

on:
  repository_dispatch:
    types: [dictation]
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Upload dictation to Google Drive
        env:
          DICTATION_TEXT: ${{ github.event.client_payload.text }}
          DICTATION_TIMESTAMP: ${{ github.event.client_payload.timestamp }}
          DICTATION_SOURCE: ${{ github.event.client_payload.source }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: python scripts/upload_to_drive.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dictation-error-logs
          path: /tmp/
          retention-days: 7
